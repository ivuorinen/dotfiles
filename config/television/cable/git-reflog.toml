[metadata]
name = "git-reflog"
description = "A channel to select from git reflog entries"
requirements = ["git"]

[source]
command = "git reflog --decorate --color=always"
output = "{strip_ansi|split: :0}"
ansi = true
no_sort = true
frecency = false

[preview]
command = "git show -p --stat --pretty=fuller --color=always '{strip_ansi|split: :0}'"

[keybindings]
ctrl-o = "actions:checkout"
ctrl-r = "actions:reset"

[actions.checkout]
description = "Checkout the selected reflog entry"
command = "git checkout '{strip_ansi|split: :0}'"
mode = "execute"

[actions.reset]
description = "Reset --hard to the selected reflog entry"
command = "git reset --hard '{strip_ansi|split: :0}'"
mode = "execute"
