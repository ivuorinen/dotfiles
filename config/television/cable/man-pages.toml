[metadata]
name = "man-pages"
description = "Browse and preview system manual pages"
requirements = ["apropos", "man"]

[source]
# List all man pages using apropos
command = "apropos ."
output = "{split: :0}"

[preview]
# Show the man page for the selected entry
command = "man '{}'"
env = { "MANWIDTH" = "80" }

[keybindings]
enter = "actions:open"

[actions.open]
description = "Open the selected man page in the system pager"
command = "man '{}'"
mode = "execute"

[ui]
layout = "portrait"
preview_panel = { header = "{}" }
