set -g @catppuccin_flavor "mocha"
set -g @catppuccin_reset "true"

# Unset per-module colors cached from prior theme (reset doesn't cover these).
# The -U flag (unset at parent scope) requires tmux >= 3.4. On older tmux the
# parser silently ignores -Ugq, leaving stale per-module colors after a flip.
set -Ugq @catppuccin_status_directory_text_fg
set -Ugq @catppuccin_status_directory_icon_fg
set -Ugq @catppuccin_status_session_text_fg
set -Ugq @catppuccin_status_session_icon_fg
set -Ugq @catppuccin_status_application_text_fg
set -Ugq @catppuccin_status_application_icon_fg
set -Ugq @catppuccin_status_date_time_text_fg
set -Ugq @catppuccin_status_date_time_icon_fg
set -Ugq @catppuccin_status_battery_text_fg
set -Ugq @catppuccin_status_battery_icon_fg

# Load catppuccin, then immediately re-assert our window blocks (rounded + zoom
# indicator) so catppuccin's basic-style rebuild doesn't win. Chained in one
# shell command so ordering is guaranteed regardless of run-shell scheduling.
run-shell "$HOME/.local/share/tmux/plugins/tmux/catppuccin.tmux && tmux source-file $HOME/.config/tmux/window-blocks.conf"
