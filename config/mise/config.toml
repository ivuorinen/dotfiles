#:schema https://mise.jdx.dev/schema/mise.json
[settings]
# Use uvx (from uv) instead of requiring pipx to be installed separately
pipx.uvx = true
trusted_config_paths = ["~/Code/ivuorinen", "~/Code/s", "~/Code/masf"]
# Respect .nvmrc, .python-version, .ruby-version, etc. in other projects.
# This repo uses .mise.toml at the repo root for pinned versions.
idiomatic_version_file = true
idiomatic_version_file_enable_tools = [
  "node",
  "python",
  "ruby",
  "go",
  "java",
  "terraform",
  "yarn",
  "bun",
  "deno",
  "dotnet",
]

# Generate mise.lock for reproducible installs
lockfile = true

# Save disk space — don't keep downloaded archives or failed installs
always_keep_download = false
always_keep_install = false
experimental = true

[tools]
# Tools are grouped by function below, not by backend. Prefixed keys
# (npm:, dotnet:, github:, aqua:) select a specific mise backend;
# unprefixed keys resolve through the default registry (aqua binaries).
# npm:/dotnet: tools live here rather than in package.json so hook
# scripts and interactive shells get them on PATH without depending on
# yarn's node_modules/.bin shim. package.json devDependencies stay
# reserved for build-time TypeScript tooling pinned per-project.

# Language runtimes & build toolchains
node = "lts"
bun = "1.3.14"
python = "3.14"
go = "1.26.5"
rust = "1.96.1"
uv = "0.11.28"
cmake = "4.3.4"

# Shell, prompt & terminal sessions
starship = "1.26.0"
tmux = "3.7b"
usage = "3.5.4"
"github:joshmedeski/sesh" = "2.26.2"
"github:jrmoulton/tmux-sessionizer" = "0.6.1"

# File navigation, search & viewing
fd = "10.4.2"
ripgrep = "15.1.0"
eza = "0.23.5"
zoxide = "0.10.0"
fzf = "0.74.0"
"github:alexpasmantier/television" = "0.15.9"
yazi = "26.5.6"
bat = "0.26.1"
glow = "2.1.2"
cheat = "5.1.0"

# Text & document processing
jq = "1.8.2"
yq = "4.53.3"
choose = "1.3.7"
"github:jgm/pandoc" = "3.10"

# Git & version control
github-cli = "2.96.0"
gitui = "0.28.1"
lazygit = "0.63.0"
delta = "0.19.2"
difftastic = "0.69.0"
"github:dotzero/git-profile" = "1.8.0"             # ships macOS-all universal binary
"github:max-sixty/worktrunk" = "0.65.0"
"npm:github-release-notes" = "0.17.3"

# Editors & language servers
neovim = "0.12.4"
tree-sitter = "0.26.11"
"npm:neovim" = "5.4.0"                      # Node.js client for Neovim's RPC API (required by plugins)
"npm:fish-lsp" = "1.1.4"

# Task runners & caching
just = "1.55.1"
"github:dimo414/bkt" = "0.8.2"

# Linters & formatters
editorconfig-checker = "3.8.0"
biome = "2.5.2"
"npm:prettier" = "3.9.5"
"npm:markdownlint-cli" = "0.49.0"
"npm:markdown-table-formatter" = "1.7.0"
"npm:v8r" = "6.1.0"
yamllint = "1.38.0"
yamlfmt = "0.21.0"
ruff = "0.15.21"
stylua = "2.5.2"
taplo = "0.10.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
actionlint = "1.7.12"
"aqua:mpalmer/action-validator" = "0.9.0"
hadolint = "2.14.0"
"dotnet:csharpier" = "1.3.0"

# Security & supply chain
age = "1.3.1"
gopass = "1.16.1"                          # pass-compatible password manager (gopasspw/gopass)
cosign = "3.1.1"
gitleaks = "8.30.1"
trufflehog = "3.95.9"
grype = "0.115.0"
trivy = "0.72.0"
syft = "1.46.0"
semgrep = "1.168.0"
opengrep = "1.25.0"
checkov = "3.3.8"
snyk = "1.1305.2"
pinact = "4.1.0"
zizmor = "1.26.1"
"github:Legit-Labs/legitify" = "1.0.11"
"github:projectdiscovery/katana" = "1.6.1"

# Build, test & CI
bats = "1.13.0"
act = "0.2.89"
"npm:corepack" = "0.35.0"
"dotnet:coverlet.console" = "10.0.1"

# System monitoring & misc utilities
bottom = "0.14.4"
"github:binwiederhier/ntfy" = "2.25.0"
"github:wakatime/wakatime-cli" = "2.21.4"
"github:o2sh/onefetch" = "2.27.1"
"github:exercism/cli" = "3.5.8"
"npm:ccusage" = "20.0.17"
"github:ZenNotes/zennotes" = "v2.12.0"
prek = "0.4.9"
"github:shhac/git-hunk" = "0.16.0"
1password-cli = "2.34.1"
"github:modem-dev/hunk" = "0.17.0"
pi = "latest"

# Homebrew formulae installed by mise's experimental brew bootstrap, without
# requiring the `brew` CLI. mise pours these into the canonical Homebrew prefix
# (/opt/homebrew), so binary paths are identical to a native `brew install`.
# Applied by `mise bootstrap packages apply` (wired into `dfm install mise`).
#
# Only homebrew/core, on-request LEAVES live here — mise resolves each formula's
# dependency closure automatically, so transitive deps are intentionally omitted.
# Kept on native brew (config/homebrew/Brewfile) on purpose: imagemagick,
# ffmpeg, coreutils (GNU, not uutils), yabai/skhd (codesign+sudo installs), and
# all casks. PHP is managed by phpenv.fish (homebrew provider), not here.
# Anything already in [tools] above (e.g. 1password-cli) is not re-introduced.
[bootstrap.packages]
"brew:autoconf-archive" = "latest"
"brew:autogen" = "latest"
"brew:automake" = "latest"
"brew:bash" = "latest"
"brew:bison" = "latest"
"brew:bzip2" = "latest"
"brew:certifi" = "latest"
"brew:chafa" = "latest"
"brew:cryptography" = "latest"
"brew:dependency-check" = "latest"
"brew:dnsmasq" = "latest"
"brew:enchant" = "latest"
"brew:exiftool" = "latest"
"brew:figlet" = "latest"
"brew:fish" = "latest"
"brew:flock" = "latest"
"brew:fswatch" = "latest"
"brew:ghostscript" = "latest"
"brew:git" = "latest"
"brew:git-extras" = "latest"
"brew:gnu-sed" = "latest"
"brew:gpg-tui" = "latest"
"brew:graphviz" = "latest"
"brew:grep" = "latest"
"brew:gzip" = "latest"
"brew:htop" = "latest"
"brew:hwloc" = "latest"
"brew:irssi" = "latest"
"brew:jpeg" = "latest"
"brew:json-c" = "latest"
"brew:kcov" = "latest"
"brew:libedit" = "latest"
"brew:libressl" = "latest"
"brew:libuv" = "latest"
"brew:libvoikko" = "latest"
"brew:libxml2" = "latest"
"brew:libyaml" = "latest"
"brew:luarocks" = "latest"
"brew:lzip" = "latest"
"brew:mole" = "latest"
"brew:moreutils" = "latest"
"brew:ossp-uuid" = "latest"
"brew:re2c" = "latest"
"brew:terminal-notifier" = "latest"
"brew:testssl" = "latest"
"brew:tree" = "latest"
"brew:watch" = "latest"
"brew:wget" = "latest"
"brew:zlib" = "latest"
