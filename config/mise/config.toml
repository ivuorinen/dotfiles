#:schema https://mise.jdx.dev/schema/mise.json
[settings]
# Use uvx (from uv) instead of requiring pipx to be installed separately
pipx.uvx = true
trusted_config_paths = ["~/Code/ivuorinen", "~/Code/s", "~/Code/masf"]
# Respect .nvmrc, .python-version, .ruby-version, etc. in other projects.
# This repo uses .mise.toml at the repo root for pinned versions.
idiomatic_version_file = true
idiomatic_version_file_enable_tools = [
  "node",
  "python",
  "ruby",
  "go",
  "java",
  "terraform",
  "yarn",
  "bun",
  "deno",
  "dotnet",
]

# Generate mise.lock for reproducible installs
lockfile = true

# Save disk space — don't keep downloaded archives or failed installs
always_keep_download = false
always_keep_install = false
experimental = true

[tools]
# Tools are grouped by function below, not by backend. Prefixed keys
# (npm:, dotnet:, github:, aqua:) select a specific mise backend;
# unprefixed keys resolve through the default registry (aqua binaries).
# npm:/dotnet: tools live here rather than in package.json so hook
# scripts and interactive shells get them on PATH without depending on
# yarn's node_modules/.bin shim. package.json devDependencies stay
# reserved for build-time TypeScript tooling pinned per-project.

# Language runtimes & build toolchains
node = "lts"
bun = "1.3.14"
python = "3.14"
go = "1.26.4"
rust = "1.96.0"
uv = "0.11.21"
cmake = "4.3.4"

# Shell, prompt & terminal sessions
starship = "1.25.1"
tmux = "3.6a"
usage = "3.4.0"
gum = "0.17.0"
"github:joshmedeski/sesh" = "2.26.2"
"github:jrmoulton/tmux-sessionizer" = "0.6.1"

# File navigation, search & viewing
fd = "10.4.2"
ripgrep = "15.1.0"
eza = "0.23.4"
zoxide = "0.9.9"
fzf = "0.73.1"
yazi = "26.5.6"
bat = "0.26.1"
glow = "2.1.2"
cheat = "5.1.0"

# Text & document processing
jq = "1.8.1"
yq = "4.53.3"
choose = "1.3.7"
"github:jgm/pandoc" = "3.10"

# Git & version control
github-cli = "2.95.0"
gitui = "0.28.1"
lazygit = "0.62.2"
delta = "0.19.2"
difftastic = "0.69.0"
"github:dotzero/git-profile" = "1.8.0"             # ships macOS-all universal binary
"github:max-sixty/worktrunk" = "0.57.0"
"npm:github-release-notes" = "0.17.3"

# Editors & language servers
neovim = "0.12.3"
tree-sitter = "0.26.9"
"npm:neovim" = "5.4.0"                      # Node.js client for Neovim's RPC API (required by plugins)
"npm:fish-lsp" = "1.1.4"

# Task runners & caching
just = "1.53.0"
"github:dimo414/bkt" = "0.8.2"

# Linters & formatters
editorconfig-checker = "3.7.0"
biome = "2.4.12"                            # pinned to match biome.json $schema; bump both together
"npm:prettier" = "3.8.4"
"npm:markdownlint-cli" = "0.48.0"
"npm:markdown-table-formatter" = "1.7.0"
"npm:v8r" = "6.1.0"
yamllint = "1.38.0"
yamlfmt = "0.21.0"
ruff = "0.15.18"
stylua = "2.5.2"
taplo = "0.10.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
actionlint = "1.7.12"
"aqua:mpalmer/action-validator" = "0.9.0"
hadolint = "2.14.0"
"dotnet:csharpier" = "1.2.6"

# Security & supply chain
age = "1.3.1"
gopass = "1.16.1"                           # pass-compatible password manager (gopasspw/gopass)
cosign = "3.1.1"
gitleaks = "8.30.1"
trufflehog = "3.95.5"
grype = "0.114.0"
trivy = "0.71.1"
syft = "1.45.1"
semgrep = "1.166.0"
opengrep = "1.22.0"
checkov = "3.3.1"
snyk = "1.1305.1"
pinact = "4.1.0"
zizmor = "1.25.2"
"github:Legit-Labs/legitify" = "1.0.11"
"github:projectdiscovery/katana" = "1.6.1"

# Build, test & CI
bats = "1.13.0"
act = "0.2.89"
"npm:corepack" = "0.35.0"
"dotnet:coverlet.console" = "10.0.1"

# System monitoring & misc utilities
bottom = "0.12.3"
"github:binwiederhier/ntfy" = "2.24.0"
"github:wakatime/wakatime-cli" = "2.15.0"
"github:o2sh/onefetch" = "2.27.1"
"github:exercism/cli" = "3.5.8"
"npm:ccusage" = "20.0.14"
"github:ZenNotes/zennotes" = "v2.3.0"
prek = "latest"

# Disabled — mise pipx backend can't find uvx when uv is mise-managed
# See https://github.com/jdx/mise/discussions/7477
