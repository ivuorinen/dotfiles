#:schema https://mise.en.dev/schema/mise.json
[settings]
# Use uvx (from uv) instead of requiring pipx to be installed separately
pipx.uvx = true
trusted_config_paths = ["~/Code/ivuorinen", "~/Code/s", "~/Code/masf"]
# Respect .nvmrc, .python-version, .ruby-version, etc. in other projects.
# This repo uses .mise.toml at the repo root for pinned versions.
idiomatic_version_file = true
idiomatic_version_file_enable_tools = [
  "node",
  "python",
  "ruby",
  "go",
  "java",
  "terraform",
  "yarn",
  "bun",
  "deno",
  "dotnet",
]

# Generate mise.lock for reproducible installs
lockfile = true

# Save disk space — don't keep downloaded archives or failed installs
always_keep_download = false
always_keep_install = false
experimental = true

[tools]
# Language runtimes
node = "lts"
bun = "latest"
python = "3.14"
go = "1.26.2"
rust = "latest"
uv = "latest"

# shell
"github:max-sixty/worktrunk" = "latest"
bat = "latest"
bats = "latest"
choose = "latest"
cmake = "4.3.2"
github-cli = "2.91.0"
gitui = "latest"
jq = "latest"
just = "latest"
lazygit = "latest"
starship = "latest"
yq = "latest"

# Pre-built binaries via aqua registry
fd = "latest"
ripgrep = "latest"
eza = "latest"
bottom = "latest"
zoxide = "latest"
tree-sitter = "latest"
neovim = "0.12.2"
delta = "latest"
difftastic = "latest"

# GitHub releases (no aqua entry)
"github:dimo414/bkt" = "latest"
"github:jrmoulton/tmux-sessionizer" = "latest"

# Go-compiled tools (no registry binary available)
"go:github.com/joshmedeski/sesh/v2" = "latest"
"go:github.com/dotzero/git-profile" = "latest"

# Registry shorthands (aqua binaries)
yamlfmt = "latest"
cheat = "latest"
glow = "latest"
fzf = "latest"
gum = "latest"

# npm-based tools
editorconfig-checker = "latest"
"npm:github-release-notes" = "latest"
"npm:neovim" = "latest"               # Node.js client for Neovim's RPC API (required by plugins)
"npm:corepack" = "latest"
"npm:fish-lsp" = "latest"

# Python tools (via pipx backend)
# Disabled: mise pipx backend can't find uvx when uv is mise-managed
