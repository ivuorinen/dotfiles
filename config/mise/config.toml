#:schema https://mise.jdx.dev/schema/mise.json
[settings]
# Use uvx (from uv) instead of requiring pipx to be installed separately
pipx.uvx = true
trusted_config_paths = ["~/Code/ivuorinen", "~/Code/s", "~/Code/masf"]
# Respect .nvmrc, .python-version, .ruby-version, etc. in other projects.
# This repo uses .mise.toml at the repo root for pinned versions.
idiomatic_version_file = true
idiomatic_version_file_enable_tools = [
  "node",
  "python",
  "ruby",
  "go",
  "java",
  "terraform",
  "yarn",
  "bun",
  "deno",
  "dotnet",
]

# Generate mise.lock for reproducible installs
lockfile = true

# Save disk space — don't keep downloaded archives or failed installs
always_keep_download = false
always_keep_install = false
experimental = true

[tools]
# Language runtimes
node = "lts"
bun = "1.3.14"
python = "3.14"
go = "1.26.4"
rust = "1.96.0"
uv = "0.11.19"

# shell
"github:max-sixty/worktrunk" = "0.56.0"
bat = "0.26.1"
bats = "1.13.0"
choose = "1.3.7"
cmake = "4.3.3"
github-cli = "2.93.0"
gitui = "0.28.1"
jq = "1.8.1"
just = "1.51.0"
lazygit = "0.62.2"
starship = "1.25.1"
yq = "4.53.3"

# Pre-built binaries via aqua registry
fd = "10.4.2"
ripgrep = "15.1.0"
eza = "0.23.4"
bottom = "0.12.3"
zoxide = "0.9.9"
tree-sitter = "0.26.9"
neovim = "0.12.2"
delta = "0.19.2"
difftastic = "0.69.0"

# GitHub releases (no aqua entry)
"github:binwiederhier/ntfy" = "2.23.0"
"github:dimo414/bkt" = "0.8.2"
"github:jgm/pandoc" = "3.9.0.2"
"github:jrmoulton/tmux-sessionizer" = "0.6.1"

# Go-compiled tools (no registry binary available)
"go:github.com/joshmedeski/sesh/v2" = "2.26.2"
"go:github.com/dotzero/git-profile" = "1.7.3"

# Registry shorthands (aqua binaries)
yamlfmt = "0.21.0"
cheat = "5.1.0"
glow = "2.1.2"
fzf = "0.73.1"
gum = "0.17.0"

# npm-based tools — kept here so hook scripts and shell sessions get
# the binary on PATH without depending on yarn's node_modules/.bin shim.
# package.json devDependencies are reserved for build-time TypeScript
# tooling that needs version pinning per-project.
editorconfig-checker = "3.7.0"
biome = "2.4.12"                            # pinned to match biome.json $schema; bump both together
"npm:ccusage" = "20.0.6"
"npm:github-release-notes" = "0.17.3"
"npm:neovim" = "5.4.0"                      # Node.js client for Neovim's RPC API (required by plugins)
"npm:corepack" = "0.35.0"
"npm:fish-lsp" = "1.1.3"
"npm:markdown-table-formatter" = "1.7.0"
"npm:markdownlint-cli" = "0.48.0"
"npm:prettier" = "3.8.3"
"npm:v8r" = "6.1.0"

# Python tools (via pipx backend)
# Disabled: mise pipx backend can't find uvx when uv is mise-managed
# See https://github.com/jdx/mise/discussions/7477
# "pipx:detect-secrets" = "latest"
# "pipx:git-filter-repo" = "latest"
yamllint = "1.38.0"
# ansible = "13.4.0"
# "pipx:ansible-lint" = "latest"
ruff = "0.15.16"
# "pipx:openapi-python-client" = "latest"
# "pipx:python-lsp-server[websockets]" = "latest"

# .NET tools (via dotnet backend)
"dotnet:coverlet.console" = "10.0.1"
"dotnet:csharpier" = "1.2.6"

# Linting, DevOps & security tools
"aqua:mpalmer/action-validator" = "0.9.0"
act = "0.2.89"
actionlint = "1.7.12"
age = "1.3.1"
checkov = "3.2.532"
cosign = "3.0.6"
gitleaks = "8.30.1"
grype = "0.114.0"
hadolint = "2.14.0"
opengrep = "1.22.0"
pinact = "4.0.0"
semgrep = "1.164.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
snyk = "1.1305.1"
stylua = "2.5.2"
syft = "1.44.0"
taplo = "0.10.0"
trivy = "0.70.0"
trufflehog = "3.95.5"

# Dev tools (pre-built binaries)
"github:exercism/cli" = "3.5.8"
"github:projectdiscovery/katana" = "1.6.1"
"github:Legit-Labs/legitify" = "1.0.11"
"github:o2sh/onefetch" = "2.27.1"
"github:wakatime/wakatime-cli" = "2.15.0"

# Terraform (replaces tfenv)
terraform = "1.15.5"
tflint = "0.63.1"
tfsec = "1.28.14"

# Other useful tools
usage = "3.4.0"
tmux = "3.6a"
yazi = "26.5.6"
