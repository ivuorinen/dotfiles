# ~/.config/tmux/tmux.conf, or .dotfiles/config/tmux/tmux.conf
#
# Contains configuration from the following sources:
# - https://tmuxguide.readthedocs.io/en/latest/tmux/tmux.html
# - https://github.com/dreamsofcode-io/tmux/blob/main/tmux.conf
#
#  ╭──────────────────────────────────────────────────────────╮
#  │ Settings                                                 │
#  ╰──────────────────────────────────────────────────────────╯
# set [flags] [command] [value]
# Flags can be combined, e.g. -as
# -a : Append the value to the existing setting.
# -s : Apply the setting to the current session.
# -g : Apply the setting globally to all sessions.
# -o : Set the option only if it is not already set.
# -u : Unset the specified option.

set -as terminal-features ",xterm-256color:RGB:clipboard:usstyle:strikethrough:overline"
set -g allow-passthrough on             # Let apps query outer terminal (OSC 11 for fish theme detection)

set -s escape-time 0                    # Address vim mode switching delay
set -s set-clipboard on                 # System clipboard via OSC 52
set -g default-terminal "tmux-256color"  # nvim checkhealth wants tmux-256color inside tmux; RGB still advertised via terminal-features above
set -g detach-on-destroy off            # don't detach tmux when killing a session
set -g display-time 0                   # Hide clock
set -g focus-events on                  # Focus events enabled for terminals that support them
set -g history-limit 50000              # Increase scrollback buffer size
set -g mouse on                         # Mouse support
set -g set-titles on                    # Allow tmux to set the terminal title
set -g status on                        # Setting status on
set -g status-interval 5                # Refresh status more often
set -g status-keys vi                   # vi keys to move between panes
set -g status-left ""                   # Clear status-left (plugins may append)
set -g status-right ""                  # Clear status-right (plugins may append)
set -g status-right-length 100          # Ensure enough room for modules
set -wg aggressive-resize on            # Better for grouped sessions and multi-monitor

# Keep Tmux alive when the initial command is finished
set -g remain-on-exit off

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

#  ╭──────────────────────────────────────────────────────────╮
#  │ Theme                                                    │
#  ╰──────────────────────────────────────────────────────────╯

set -g status-position "bottom"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_date_time_text " %d.%m %H:%M"

#  ╭──────────────────────────────────────────────────────────╮
#  │ Bindings                                                 │
#  ╰──────────────────────────────────────────────────────────╯
# bind flags
# -N = Note / description of the command
# -r = repeatable, only needs prefix once
# -n = doesn't need prefix
# -t = binds to a certain key-table (root, copy-mode, prefix, etc.)

# Set <prefix> to Control + Space, keeping the default of C-b intact.
# C-Space send-prefix line doubles the prefix when in nested tmux session.
set -g prefix C-Space
bind -N "Send the prefix key to a nested session" C-Space send-prefix

# Use Ctrl-arrow keys without prefix key to switch panes
bind -n -N "Select the pane to the left" C-Left select-pane -L
bind -n -N "Select the pane to the right" C-Right select-pane -R
bind -n -N "Select the pane above" C-Up select-pane -U
bind -n -N "Select the pane below" C-Down select-pane -D

# Reload tmux config with <prefix> + r
unbind r
bind -N "Reload the tmux config" r "source-file ~/.dotfiles/config/tmux/tmux.conf; display 'tmux cfg reloaded!'"

# copy mode using 'Esc'
unbind [
bind -N "Enter copy mode" Escape copy-mode

# paste using 'p'
unbind p
bind -N "Paste the most recent buffer" p paste-buffer

# copy-mode-vi: y copies to system clipboard, Y copies and pastes
bind -T copy-mode-vi -N "Copy selection to the system clipboard" y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi -N "Copy selection and paste it" Y send-keys -X copy-pipe-and-cancel "tmux paste-buffer"

# easier switching between next/prev window
bind -N "Previous window" C-p previous-window
bind -N "Next window" C-n next-window

# global sessions
bind -N "sesh selection"           t display-popup -E "$HOME/.dotfiles/config/tmux/sesh.sh"
bind -N "last-session (via sesh) " L run-shell "sesh last"
bind -N "sesh ui"                  N display-popup -E "sesh ui"

#  ╭──────────────────────────────────────────────────────────╮
#  │ Plugins                                                  │
#  ╰──────────────────────────────────────────────────────────╯

# ── Plugin manager path ──────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

# ── Plugin configurations ────────────────────────────────────────────

# Plugin that lets you suspend local tmux session,
# so that you can work with nested remote tmux session painlessly.
# https://github.com/MunifTanjim/tmux-suspend
set -g @suspend_key 'F8' # Default is F12

# https://github.com/tmux-plugins/tmux-continuum
set -g @continuum-restore 'on'

# Remap sessionist's join-pane key to avoid conflict with sesh (prefix+t)
set -g @sessionist-join-pane 'T'

# ── Plugin declarations ──────────────────────────────────────────────
# Dark/light theme switching is owned by the config/theme orchestrator
# (apply + watcher). No tmux plugin involved; see orchestrator bootstrap
# at the end of this file.

set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'soyuka/tmux-current-pane-hostname'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'

# ── Own scripts (pre-TPM) ────────────────────────────────────────────

# If we started tmux with a session name, rename it.
run-shell "$HOME/.dotfiles/config/tmux/rename-session.sh"

# ── TPM bootstrap & runner ───────────────────────────────────────────
# Auto-install TPM on first launch, then run it. The theme orchestrator
# bootstrap runs after TPM so catppuccin.tmux is on disk.

if "test ! -d ~/.local/share/tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"

run '~/.local/share/tmux/plugins/tpm/tpm'

# ── Status modules (after TPM so catppuccin variables exist) ─────────
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ── Theme bootstrap (post-TPM so catppuccin.tmux is on disk) ──
# Invoke the tmux handler directly, not `apply`. apply's idempotency guard
# skips handlers when the state file already matches current mode — correct
# for watcher-driven flips, wrong for a fresh tmux server that hasn't yet
# sourced any palette. The watcher (spawned from shell init in config.fish
# / exports) keeps already-running servers in sync; this primes new ones.
run-shell 'D="${DOTFILES:-$HOME/.dotfiles}"; "$D/config/theme/handlers.d/tmux" "$("$D/local/bin/theme-mode")"'
