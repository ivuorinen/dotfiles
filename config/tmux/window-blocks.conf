# Window blocks — owned here, not by catppuccin.
#
# The theme palettes (config/theme/palettes.d/tmux.*.conf) re-run catppuccin
# with @catppuccin_reset=true on every load and theme flip, which resets
# @catppuccin_window_status_style back to "basic". So a rounded, zoom-aware
# window list cannot be expressed through catppuccin's window options — they get
# rebuilt away. Each palette sources THIS file right after catppuccin instead,
# so these formats win. Colours are lazy #{@thm_*} refs, so they still adapt on
# dark/light flips without a rebuild.

# Glyphs populated from raw UTF-8 bytes so they cannot be lost in editing:
#   @_cap_l  U+E0B6 left rounded cap   (EE 82 B6) — same cap catppuccin uses
#   @_cap_r  U+E0B4 right rounded cap  (EE 82 B4)
#   @_zoom   U+F0293 fullscreen glyph  (F3 B0 8A 93)
# Resolved lazily as #{@_cap_l} etc. at draw time, after this run-shell fires.
run-shell 'tmux set -g @_cap_l "$(printf "\xee\x82\xb6")"; tmux set -g @_cap_r "$(printf "\xee\x82\xb4")"; tmux set -g @_zoom "$(printf "\xf3\xb0\x8a\x93")"'

# Active-window block colour: peach while its pane is zoomed, else mauve.
# #{E:@_win_zoom_bg} is evaluated per-window at draw time, so the flag is live.
set -g @_win_zoom_bg "#{?window_zoomed_flag,#{@thm_peach},#{@thm_mauve}}"

set -g window-status-separator ""

# Inactive window: rounded surface pill with the index, then a dim name.
set -g window-status-format "#[fg=#{@thm_surface_1},bg=default]#{@_cap_l}#[fg=#{@thm_fg},bg=#{@thm_surface_1}] #I #[fg=#{@thm_surface_1},bg=default]#{@_cap_r}#[fg=#{@thm_overlay_1},bg=default] #W "

# Active window: rounded pill that turns peach and swaps the index for the zoom
# glyph while the pane is zoomed, then the window name in bold.
set -g window-status-current-format "#[fg=#{E:@_win_zoom_bg},bg=default]#{@_cap_l}#[fg=#{@thm_crust},bg=#{E:@_win_zoom_bg}] #{?window_zoomed_flag,#{@_zoom},#I} #[fg=#{E:@_win_zoom_bg},bg=default]#{@_cap_r}#[fg=#{@thm_fg},bg=default,bold] #W "
