set -g @catppuccin_flavor "latte"
set -g @catppuccin_reset "true"

# Unset per-module colors cached from prior theme (reset doesn't cover these)
set -Ugq @catppuccin_status_directory_text_fg
set -Ugq @catppuccin_status_directory_icon_fg
set -Ugq @catppuccin_status_session_text_fg
set -Ugq @catppuccin_status_session_icon_fg
set -Ugq @catppuccin_status_application_text_fg
set -Ugq @catppuccin_status_application_icon_fg
set -Ugq @catppuccin_status_date_time_text_fg
set -Ugq @catppuccin_status_date_time_icon_fg

run-shell "$HOME/.local/share/tmux/plugins/tmux/catppuccin.tmux"
