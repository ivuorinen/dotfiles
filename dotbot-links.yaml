---
- include: "tools/dotbot-defaults.yaml"

- clean:
    ~/:
    ~/.config:
      recursive: true
    ~/.local/bin:
    ~/.local/man:
      recursive: true
    ~/.local/share:
    ~/.ssh:
      recursive: true

- create:
    ~/.cache:
    ~/.cache/git:
    ~/.config:
    ~/.local:
    ~/.local/bin:
    ~/.local/run:
    ~/.local/share:
    ~/.local/share/tmux/plugins:
    ~/.local/share/gnupg:
      mode: 0700
    ~/.local/state:
    ~/.local/state/tmux:
    ~/.local/state/zsh:
    ~/.ssh:
      mode: 0700
    ~/.ssh/local.d:
      mode: 0700
    ~/Code:

- link:
    ~/:
      force: true
      glob: true
      path: base/*
      prefix: "."
    # Most of the configs
    ~/.config/:
      glob: true
      relink: true
      path: config/*
      # Themed apps are NOT excluded: every theme handler writes into
      # $XDG_STATE_HOME/dotfiles-theme/ and the app is pointed there via an
      # env var (BAT_THEME, GH_DASH_CONFIG, TELEVISION_CONFIG, …), so their
      # config dirs are plain symlinks. The remaining excludes are 1Password's
      # split sub-paths (below) and cosmic-desktop's runtime-written state.
      exclude:
        - config/op
        - config/cosmic-desktop
    # 1Password CLI plugins
    ~/.config/op/plugins.sh:
      relink: true
      path: config/op/plugins.sh
    ~/.config/op/plugins:
      relink: true
      path: config/op/plugins
    # Scripts
    ~/.local/bin:
      glob: true
      path: local/bin/*
    # Manuals
    ~/.local/man:
      glob: true
      path: local/man/**
    ~/.local/share:
      glob: true
      path: local/share/*
    # SSH Configuration
    ~/.ssh/:
      glob: true
      mode: 0600
      path: ssh/*
    # mise → asdf compatibility (tools expecting ~/.asdf find mise data)
    ~/.asdf:
      path: ~/.local/share/mise
      relink: true
      force: true
