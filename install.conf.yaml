---
- include: "tools/dotbot-defaults.yaml"

- clean:
    ~/:
    ~/.config:
      recursive: true
    ~/.local/bin:
    ~/.local/man:
      recursive: true
    ~/.local/share:
    ~/.ssh:
      recursive: true

- create:
    ~/.cache:
    ~/.cache/git:
    ~/.config:
    ~/.local:
    ~/.local/bin:
    ~/.local/run:
    ~/.local/share:
    ~/.local/share/tmux/plugins:
    ~/.local/share/gnupg:
      mode: 0700
    ~/.local/state:
    ~/.local/state/tmux:
    ~/.local/state/zsh:
    ~/.ssh:
      mode: 0700
    ~/.ssh/local.d:
      mode: 0700
    ~/Code:

- link:
    ~/:
      force: true
      glob: true
      path: base/*
      prefix: "."
    # Most of the configs
    ~/.config/:
      glob: true
      relink: true
      path: config/*
      # Excluded paths are managed by the theme orchestrator (handlers
      # write merged or flip-able files into ~/.config/<app>/), or are
      # 1Password's split sub-paths below.
      exclude:
        - config/op
        - config/bat
        - config/cosmic-desktop
        - config/gh-dash
    # 1Password CLI plugins
    ~/.config/op/plugins.sh:
      relink: true
      path: config/op/plugins.sh
    ~/.config/op/plugins:
      relink: true
      path: config/op/plugins
    # bat: only the themes directory is repo-managed; the theme handler
    # writes ~/.config/bat/config as a flip-able symlink alongside it.
    ~/.config/bat/themes:
      create: true
      relink: true
      path: config/bat/themes
    # Scripts
    ~/.local/bin:
      glob: true
      path: local/bin/*
    # Manuals
    ~/.local/man:
      glob: true
      path: local/man/**
    ~/.local/share:
      glob: true
      path: local/share/*
    # SSH Configuration
    ~/.ssh/:
      glob: true
      mode: 0600
      path: ssh/*
    # mise → asdf compatibility (tools expecting ~/.asdf find mise data)
    ~/.asdf:
      path: ~/.local/share/mise
      relink: true
      force: true

- shell:
    # Add Git submodules and remove old ones. A non-zero exit here
    # leaves the tree in a half-installed state — fail loudly so the
    # subsequent `git submodule update` is not run against a broken
    # state.
    - bash add-submodules.sh
    # Update submodules recursively
    - git submodule update --init --recursive --force

- shell:
    # Use my dotfiles manager to install everything
    - bash local/bin/dfm install all
