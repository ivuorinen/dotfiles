---
- include: "tools/dotbot-defaults.yaml"

- clean:
    ~/:
    ~/.config:
      recursive: true
      exclude:
        - "mise/config.toml"
    ~/.local/bin:
    ~/.local/man:
      recursive: true
    ~/.local/share:
    ~/.ssh:
      recursive: true

- create:
    ~/.cache:
    ~/.cache/git:
    ~/.config:
    ~/.local:
    ~/.local/bin:
    ~/.local/run:
    ~/.local/share:
    ~/.local/share/tmux/plugins:
    ~/.local/share/gnupg:
      mode: 0700
    ~/.local/state:
    ~/.local/state/tmux:
    ~/.local/state/zsh:
    ~/.ssh:
      mode: 0700
    ~/.ssh/local.d:
      mode: 0700
    ~/Code:

- link:
    ~/:
      force: true
      glob: true
      path: base/*
      prefix: "."
    # mise config — force-relink because mise may create the file before Dotbot runs
    ~/.config/mise/config.toml:
      force: true
      path: config/mise/config.toml
    # Most of the configs
    ~/.config/:
      glob: true
      relink: true
      path: config/*
      exclude: [config/op, config/mise]
    # 1Password CLI plugins
    ~/.config/op/plugins.sh:
      relink: true
      path: config/op/plugins.sh
    ~/.config/op/plugins:
      relink: true
      path: config/op/plugins
    # Scripts
    ~/.local/bin:
      glob: true
      path: local/bin/*
    # Manuals
    ~/.local/man:
      glob: true
      path: local/man/**
    ~/.local/share:
      glob: true
      path: local/share/*
    # SSH Configuration
    ~/.ssh/:
      glob: true
      mode: 0600
      path: ssh/*
    # mise → asdf compatibility (tools expecting ~/.asdf find mise data)
    ~/.asdf:
      path: ~/.local/share/mise
      relink: true
      force: true

- shell:
    # Add Git submodules and remove old ones
    - bash add-submodules.sh || true
    # Update submodules recursively
    - git submodule update --init --recursive --force

- shell:
    # Use my dotfiles manager to install everything
    - bash local/bin/dfm install all
