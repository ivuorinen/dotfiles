---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=auto]

  - repo: local
    hooks:
      - id: biome-check
        name: Biome Check
        entry: biome check --write --files-ignore-unknown=true --no-errors-on-unmatched
        language: system
        files: \.(js|ts|jsx|tsx|json)$
      - id: markdown-table-formatter
        name: Markdown Table Formatter
        entry: markdown-table-formatter
        language: system
        types: [markdown]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: local
    hooks:
      - id: prettier
        name: Prettier (YAML)
        entry: prettier --write
        language: system
        types_or: [yaml]
      - id: v8r
        name: v8r (JSON Schema validation)
        entry: v8r
        language: system
        # Schema-backed config files only. v8r resolves schemas via
        # schemastore.org and fails the hook on any unknown property,
        # which is the whole point of adding it — see
        # .claude/rules/validate-config-schemas.md.
        files: ^(\.mega-linter\.yml|\.pre-commit-config\.yaml|biome\.json|package\.json|\.markdownlint\.json)$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        exclude: ^config/(bash/completions\.d|zsh/completions\.d)/

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        exclude: ^config/(bash/completions\.d/|zsh/completions\.d/|fzf/(key-bindings|completion)\.(bash|zsh)$)
        args: [-i, "2", -bn, -ci, -sr, -fn, -w]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.5.2
    hooks:
      - id: stylua # or stylua-system / stylua-github
        exclude: hammerspoon\.types\.lua$

  - repo: https://github.com/hugoh/pre-commit-fish.git
    rev: v1.2
    hooks:
      - id: fish_syntax
      - id: fish_indent

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
        exclude: ^config/(bash/completions\.d|zsh/completions\.d)/
      - id: ruff-format
        exclude: ^config/(bash/completions\.d|zsh/completions\.d)/

  - repo: local
    hooks:
      - id: usage-lint
        name: usage lint (scripts/ and local/bin/)
        entry: bash -c 'rc=0; for f in "$@"; do grep -q "#USAGE\|//USAGE" "$f" 2>/dev/null || continue; usage lint "$f" || rc=1; done; exit $rc' --
        language: system
        files: ^(scripts/.*\.sh|local/bin/[^/]+)$
        exclude: \.(py|pl|php)$
