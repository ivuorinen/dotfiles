---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Daily State

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *" # 00:00 EEST (summer, UTC+3) / 23:00 EET (winter, UTC+2)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  new-daily-release:
    name: "New daily release"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      created: ${{ steps.daily-version.outputs.created }}
      version: ${{ steps.daily-version.outputs.version }}

    steps:
      # persist-credentials MUST stay true: fregante/daily-version-action
      # pushes the new tag using the checkout's git credentials (it has no
      # token input), so disabling this breaks the daily release entirely.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true # zizmor: ignore[artipacked]

      - name: Create tag if necessary
        uses: fregante/daily-version-action@4bd6944b98e29a3d1b130677012fb1e4ffddc31d # v3.1.0
        id: daily-version

      - name: Create changelog text
        if: steps.daily-version.outputs.created
        id: changelog
        uses: loopwerk/tag-changelog@5935b306b0f84d4ebd40175b182a0b7175509ebe # v1.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_file: .github/tag-changelog-config.js

      - name: Create release
        if: steps.daily-version.outputs.created
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.daily-version.outputs.version }}
          name: Release ${{ steps.daily-version.outputs.version }}
          body: ${{ steps.changelog.outputs.changes }}
