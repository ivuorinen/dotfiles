---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  copilot-setup-steps:
    name: "Copilot: Setup steps"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install Yarn release
        run: corepack install

      - name: Install JavaScript dependencies
        run: yarn install --immutable

      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck shfmt

      - name: Install stylua
        run: |
          # renovate: datasource=github-releases depName=JohnnyMorganz/StyLua
          STYLUA_VERSION="2.4.1"
          curl -sSL "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip" \
            -o /tmp/stylua.zip
          unzip -q /tmp/stylua.zip -d /tmp/stylua/
          sudo install -m 0755 /tmp/stylua/stylua /usr/local/bin/stylua

      - name: Set up Python for pre-commit
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit==4.2.0

      - name: Install pre-commit hooks
        run: |
          pre-commit install
          pre-commit install-hooks
