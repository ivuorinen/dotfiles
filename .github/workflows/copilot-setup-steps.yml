---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install Yarn release
        run: corepack install

      - name: Install JavaScript dependencies
        run: yarn install --immutable

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Install shfmt
        run: |
          SHFMT_VERSION="3.10.0"
          curl -sSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" \
            -o /tmp/shfmt
          sudo install -m 0755 /tmp/shfmt /usr/local/bin/shfmt

      - name: Install stylua
        run: |
          STYLUA_VERSION="2.4.1"
          curl -sSL "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip" \
            -o /tmp/stylua.zip
          unzip -q /tmp/stylua.zip -d /tmp/stylua/
          sudo install -m 0755 /tmp/stylua/stylua /usr/local/bin/stylua
