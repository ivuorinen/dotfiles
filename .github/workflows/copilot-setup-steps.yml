---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions: {}

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install Yarn release
        run: corepack install

      - name: Install JavaScript dependencies
        run: yarn install --immutable

      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck shfmt

      - name: Install stylua
        run: |
          STYLUA_VERSION="2.4.1"
          curl -sSL "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip" \
            -o /tmp/stylua.zip
          unzip -q /tmp/stylua.zip -d /tmp/stylua/
          sudo install -m 0755 /tmp/stylua/stylua /usr/local/bin/stylua

      - name: Set up Python for pre-commit
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit==4.2.0

      - name: Install pre-commit hooks
        run: |
          pre-commit install
          pre-commit install-hooks
